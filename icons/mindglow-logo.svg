<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)"/>
  
  <!-- Lotus petals (simplified) -->
  <g fill="#ffffff" opacity="0.9">
    <!-- Center petal -->
    <ellipse cx="256" cy="280" rx="40" ry="80"/>
    <!-- Left petals -->
    <ellipse cx="200" cy="300" rx="35" ry="70" transform="rotate(-30 200 300)"/>
    <ellipse cx="160" cy="330" rx="30" ry="60" transform="rotate(-50 160 330)"/>
    <!-- Right petals -->
    <ellipse cx="312" cy="300" rx="35" ry="70" transform="rotate(30 312 300)"/>
    <ellipse cx="352" cy="330" rx="30" ry="60" transform="rotate(50 352 330)"/>
  </g>
  
  <!-- Brain/mind circle -->
  <circle cx="256" cy="180" r="60" fill="#ffffff" opacity="0.95"/>
  
  <!-- "MG" text -->
  <text x="256" y="200" font-family="Arial, sans-serif" font-size="50" font-weight="bold" 
        fill="#6366f1" text-anchor="middle">MG</text>
</svg>
